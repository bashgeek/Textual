name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" \
            "Sources/App/Resources/Property Lists/Application Properties/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" \
            "Sources/App/Resources/Property Lists/Application Properties/Info.plist"

      - name: Build
        run: ./build.sh

      - name: Package
        run: |
          cd build
          zip -r --symlinks "Textwerk-${{ github.ref_name }}.zip" Textwerk.app

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [[ -n "$PREV_TAG" ]]; then
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges > changelog.txt
          else
            git log --pretty=format:"- %s" --no-merges > changelog.txt
          fi

      - name: Sign update and generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz -o sparkle-tools.tar.xz
          mkdir -p sparkle-tools
          tar -xJf sparkle-tools.tar.xz -C sparkle-tools bin/generate_appcast
          chmod +x sparkle-tools/bin/*

          mkdir -p appcast-work
          cp "build/Textwerk-${{ github.ref_name }}.zip" appcast-work/
          cp changelog.txt "appcast-work/Textwerk-${{ github.ref_name }}.txt"

          # Seed with the previous release's appcast (if any) so version
          # history is preserved instead of the feed resetting every release.
          curl -sL -f -o appcast-work/appcast.xml \
            "https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml" \
            || rm -f appcast-work/appcast.xml

          echo "$SPARKLE_PRIVATE_KEY" | ./sparkle-tools/bin/generate_appcast appcast-work \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" \
            -o appcast-work/appcast.xml

          cp appcast-work/appcast.xml build/appcast.xml

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file changelog.txt \
            "build/Textwerk-${{ github.ref_name }}.zip" \
            "build/appcast.xml"
        env:
          GH_TOKEN: ${{ github.token }}
